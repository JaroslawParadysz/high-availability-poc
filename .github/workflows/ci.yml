name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/HighAvailability.sln

      - name: Build
        run: dotnet build src/HighAvailability.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test src/HighAvailability.sln
          --no-build
          -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Results
          path: test-results/*.trx
          reporter: dotnet-trx

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t connector:${{ github.sha }} src
